/* tokens/colors.css */
/* ================================================================== *
 * COLORS — NC Consulting Design System
 * Palette: deep navy authority, safety amber accent, precise neutrals,
 * and RAG status colours that are the backbone of project reporting.
 * ================================================================== */

:root {
  /* --- Brand navy (authority, structure, headings) --- */
  --navy-900: #0C1B2A;
  --navy-800: #102538;
  --navy-700: #16324A;
  --navy-600: #1F4363;
  --navy-500: #2C5378;
  --navy-300: #7C97B2;
  --navy-100: #DCE6EF;
  --navy-50:  #EEF3F8;

  /* --- Gold (accent: action, emphasis) --- */
  --amber-700: #957512;
  --amber-600: #AE8A16;
  --amber-500: #C6A02A;
  --amber-400: #D8B84E;
  --amber-100: #F2E6C2;
  --amber-50:  #FBF6E7;

  /* --- Neutral gray (surfaces, text, borders) --- */
  --gray-900: #14181D;
  --gray-800: #242B33;
  --gray-700: #3A424B;
  --gray-600: #545D67;
  --gray-500: #6B7480;
  --gray-400: #939BA5;
  --gray-300: #C6CCD3;
  --gray-200: #DFE3E8;
  --gray-100: #EEF1F4;
  --gray-50:  #F7F9FB;
  --white:    #FFFFFF;

  /* --- RAG status (Red / Amber / Green project health) --- */
  --status-green-600: #167A4F;
  --status-green-500: #1F8A5B;
  --status-green-100: #DCF0E6;
  --status-amber-600: #B0770A;
  --status-amber-500: #C9860B;
  --status-amber-100: #FBEECE;
  --status-red-600:   #B23327;
  --status-red-500:   #C63A2E;
  --status-red-100:   #F7DCD9;
  --status-blue-600:  #1F4363;
  --status-blue-500:  #2C5378;
  --status-blue-100:  #DCE6EF;

  /* ============================================================ *
   * SEMANTIC ALIASES — reference these in components, not raws
   * ============================================================ */

  /* Text */
  --text-strong:  var(--navy-900);
  --text-body:    var(--gray-800);
  --text-muted:   var(--gray-500);
  --text-faint:   var(--gray-400);
  --text-invert:  var(--white);
  --text-accent:  var(--amber-600);
  --text-link:    var(--navy-600);

  /* Surfaces */
  --surface-page:    var(--gray-50);
  --surface-card:    var(--white);
  --surface-sunken:  var(--gray-100);
  --surface-inverse: var(--navy-900);
  --surface-accent:  var(--amber-50);

  /* Borders / lines */
  --border-subtle: var(--gray-200);
  --border-default: var(--gray-300);
  --border-strong: var(--gray-400);
  --border-focus:  var(--amber-500);

  /* Interactive (primary = navy, action = amber) */
  --action-primary:       var(--navy-800);
  --action-primary-hover: var(--navy-700);
  --action-primary-press: var(--navy-900);
  --action-accent:        var(--amber-500);
  --action-accent-hover:  var(--amber-600);
  --action-accent-press:  var(--amber-700);

  /* Status semantic */
  --ontrack:   var(--status-green-500);
  --ontrack-bg: var(--status-green-100);
  --atrisk:    var(--status-amber-500);
  --atrisk-bg: var(--status-amber-100);
  --delayed:   var(--status-red-500);
  --delayed-bg: var(--status-red-100);
  --info:      var(--status-blue-500);
  --info-bg:   var(--status-blue-100);
}

/* tokens/typography.css */
/* ================================================================== *
 * TYPOGRAPHY — NC Consulting Design System
 * Sans for structure & prose; Mono for every number, figure and code.
 * "All results come from numbers" — numerals get their own typeface.
 * ================================================================== */

:root {
  /* Families */
  --font-sans: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
  --font-cond: 'IBM Plex Sans Condensed', 'IBM Plex Sans', sans-serif;
  --font-mono: 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  /* Weights */
  --weight-regular: 400;
  --weight-medium:  500;
  --weight-semibold: 600;
  --weight-bold:    700;

  /* Type scale (1.200 minor-third, base 16px) */
  --text-2xs: 11px;
  --text-xs:  12px;
  --text-sm:  14px;
  --text-md:  16px;
  --text-lg:  19px;
  --text-xl:  23px;
  --text-2xl: 28px;
  --text-3xl: 34px;
  --text-4xl: 41px;
  --text-5xl: 54px;

  /* Line heights */
  --leading-tight:  1.15;
  --leading-snug:   1.3;
  --leading-normal: 1.5;
  --leading-relaxed: 1.65;

  /* Letter spacing */
  --tracking-tight:  -0.02em;
  --tracking-normal: 0;
  --tracking-wide:   0.04em;
  --tracking-caps:   0.08em;

  /* Semantic roles */
  --type-display:   var(--weight-bold)     var(--text-5xl)/var(--leading-tight) var(--font-cond);
  --type-h1:        var(--weight-semibold) var(--text-4xl)/var(--leading-tight) var(--font-sans);
  --type-h2:        var(--weight-semibold) var(--text-3xl)/var(--leading-snug)  var(--font-sans);
  --type-h3:        var(--weight-semibold) var(--text-2xl)/var(--leading-snug)  var(--font-sans);
  --type-h4:        var(--weight-semibold) var(--text-xl)/var(--leading-snug)   var(--font-sans);
  --type-body:      var(--weight-regular)  var(--text-md)/var(--leading-normal) var(--font-sans);
  --type-body-sm:   var(--weight-regular)  var(--text-sm)/var(--leading-normal) var(--font-sans);
  --type-metric:    var(--weight-600)      var(--text-4xl)/var(--leading-tight) var(--font-mono);
  --type-label:     var(--weight-semibold) var(--text-2xs)/1.2 var(--font-sans);
}

/* Utility: overline / eyebrow label used across brand */
.nc-overline {
  font: var(--type-label);
  letter-spacing: var(--tracking-caps);
  text-transform: uppercase;
  color: var(--text-muted);
}

/* tokens/spacing.css */
/* ================================================================== *
 * SPACING — NC Consulting Design System
 * 4px base grid. Dense, orderly, engineering-drawing rhythm.
 * ================================================================== */

:root {
  --space-0:  0;
  --space-1:  2px;
  --space-2:  4px;
  --space-3:  8px;
  --space-4:  12px;
  --space-5:  16px;
  --space-6:  20px;
  --space-7:  24px;
  --space-8:  32px;
  --space-9:  40px;
  --space-10: 48px;
  --space-11: 64px;
  --space-12: 80px;
  --space-13: 96px;
  --space-14: 128px;

  /* Layout */
  --container-max: 1200px;
  --gutter: var(--space-8);
  --page-pad: var(--space-9);
}

/* tokens/elevation.css */
/* ================================================================== *
 * SHAPE & ELEVATION — NC Consulting Design System
 * Low radii = precise, technical. Shadows are tight and cool.
 * ================================================================== */

:root {
  /* Corner radii */
  --radius-none: 0;
  --radius-sm: 3px;
  --radius-md: 5px;
  --radius-lg: 8px;
  --radius-xl: 12px;
  --radius-pill: 999px;

  /* Border widths */
  --border-hairline: 1px;
  --border-medium: 1.5px;
  --border-heavy: 2px;

  /* Elevation — cool, tight, engineering-clean */
  --shadow-xs: 0 1px 2px rgba(12, 27, 42, 0.06);
  --shadow-sm: 0 1px 3px rgba(12, 27, 42, 0.08), 0 1px 2px rgba(12, 27, 42, 0.06);
  --shadow-md: 0 2px 6px rgba(12, 27, 42, 0.08), 0 4px 12px rgba(12, 27, 42, 0.06);
  --shadow-lg: 0 8px 24px rgba(12, 27, 42, 0.10), 0 2px 6px rgba(12, 27, 42, 0.06);
  --shadow-focus: 0 0 0 3px rgba(228, 97, 10, 0.28);

  /* Motion — quick, no bounce; efficient */
  --ease-standard: cubic-bezier(0.2, 0, 0.2, 1); /* @kind other */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */
  --dur-fast: 120ms; /* @kind other */
  --dur-med: 200ms; /* @kind other */
  --dur-slow: 320ms; /* @kind other */
}

* { box-sizing: border-box; }

function ncPeriod(a, b, lang) {
  const yr = (s) => (s && /^\d{4}/.test(s)) ? s.slice(0, 4) : '';
  const sy = yr(a), ey = yr(b);
  const now = (lang === 'zh') ? '至今' : 'now';
  // 結束日還沒到今天 → 進行中，顯示「至今」
  const ongoing = b && /^\d{4}-\d{2}-\d{2}/.test(b) && new Date(b) > new Date();
  const endLabel = ongoing ? now : ey;
  if (sy && endLabel) return sy === endLabel ? sy : (sy + '–' + endLabel);
  return sy || endLabel || '';
}
function TrackRecord({ lang, projects }) {
  const { Badge } = window.NCConsultingDesignSystem_e6b8d5;
  const t = NC_COPY[lang];
  const ownerL = lang === 'zh' ? '業主' : 'Owner';
  const [expanded, setExpanded] = React.useState(false);
  const LIMIT = 12;
  const records = (projects && projects.length)
    ? projects.map(p => ({
        name: lang === 'zh' ? (p.Title || p.Title_EN) : (p.Title_EN || p.Title),
        service: lang === 'zh' ? (p.Service_Type || p.Service_type || p.Project_Type || '') : (p.Service_Type_EN || p.Service_type_EN || p.Service_Type || p.Service_type || p.Project_Type || ''),
        owner: p.Owner || '',
        period: ncPeriod(p.Project_Start_Date, p.Project_End_Date, lang),
      }))
    : (t.records || []).map(r => ({ name: r[0], service: r[1], owner: '', period: r[2] }));
  const shown = expanded ? records : records.slice(0, LIMIT);
  const extra = records.length - LIMIT;
  return (
    <section id="record" style={{ padding: '72px 0', background: 'var(--white)' }}>
      <div style={WRAP}>
        <span style={overline()}>{t.recEyebrow}</span>
        <h2 style={{ margin: '10px 0 28px', font: 'var(--weight-semibold) 30px/1.25 var(--font-sans)', color: 'var(--text-strong)' }}>{t.recTitle}</h2>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0 40px' }}>
          {shown.map((r, i) => (
              <div key={i} style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 14, padding: '16px 0', borderTop: '1px solid var(--border-subtle)' }}>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 6, minWidth: 0 }}>
                  <span style={{ font: 'var(--weight-medium) 15px var(--font-sans)', color: 'var(--text-strong)' }}>{r.name}</span>
                  {r.owner ? <span style={{ font: '13px var(--font-sans)', color: 'var(--text-muted)' }}>{ownerL} · {r.owner}</span> : null}
                  {r.service ? <span><Badge variant="navy">{r.service}</Badge></span> : null}
                </div>
                <span style={{ font: 'var(--weight-medium) 13px var(--font-mono)', color: 'var(--text-muted)', flex: 'none', whiteSpace: 'nowrap' }}>{r.period}</span>
              </div>
          ))}
        </div>
        {extra > 0 ? (
          <div style={{ display: 'flex', justifyContent: 'center', marginTop: 28 }}>
            <button onClick={() => setExpanded(!expanded)} style={{ display: 'inline-flex', alignItems: 'center', gap: 8, padding: '10px 22px', background: 'transparent', border: '1px solid var(--border-default)', borderRadius: 6, cursor: 'pointer', font: 'var(--weight-medium) 14px var(--font-sans)', color: 'var(--navy-800)' }}>
              {expanded ? (lang === 'zh' ? '收合' : 'Show less') : (lang === 'zh' ? `查看更多 (+${extra})` : `Show more (+${extra})`)}
            </button>
          </div>
        ) : null}
      </div>
    </section>
  );
}

</script>
<script type="text/babel">
  const { useState } = React;
  const S = window.SiteSections;
  function App() {
    const [lang, setLang] = useState(() => localStorage.getItem('nc-lang') || (navigator.language.startsWith('en') ? 'en' : 'zh'));
    const [projects, setProjects] = useState(null);
    const setLangP = (l) => { setLang(l); localStorage.setItem('nc-lang', l); document.documentElement.lang = l === 'zh' ? 'zh-Hant' : 'en'; };
    React.useEffect(() => { document.documentElement.lang = lang === 'zh' ? 'zh-Hant' : 'en'; }, [lang]);
    React.useEffect(() => {
      // 工程實績由 data.json 提供（可由 SharePoint / Power Automate 匯出更新）。
      // 讀取失敗時自動沿用頁面內建的資料，網站不會壞。
      fetch('data.json', { cache: 'no-cache' })
        .then(r => r.ok ? r.json() : null)
        .then(d => { if (d && Array.isArray(d.projects)) setProjects(d.projects); })
        .catch(() => {});
    }, []);
    return React.createElement('div', null,
      React.createElement(S.SiteHeader, { lang, onLang: setLangP }),
      React.createElement(S.Hero, { lang }),
      React.createElement(S.About, { lang }),
      React.createElement(S.Services, { lang }),
      React.createElement(S.Capabilities, { lang }),
      React.createElement(S.Milestones, { lang }),
      React.createElement(S.Strengths, { lang }),
      React.createElement(S.TrackRecord, { lang, projects }),
      React.createElement(S.Contact, { lang }),
      React.createElement(S.SiteFooter, { lang })
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
